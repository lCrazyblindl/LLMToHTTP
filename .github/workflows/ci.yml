name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core + dev)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke - lint the example spec
        run: python -m lap.lint lap/examples/bookstore.openapi.json
